<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zayn’s Streak Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-noise" aria-hidden="true"></div>

  <main class="app" role="main">
    <header class="top">
      <div class="title-row">
        <h1 class="title glitch" data-text="Zayn’s Streak Tracker">Zayn’s Streak Tracker</h1>
      </div>

      <section class="day-card" aria-label="Day counter">
        <div class="day-line">
          <div class="day-text">
            <span class="label">Day</span>
            <span id="currentDay" class="value">1</span>
            <span class="label">of</span>
          </div>

          <label class="total-days">
            <span class="sr-only">Total days</span>
            <input id="totalDaysInput" type="number" min="1" step="1" inputmode="numeric" />
          </label>
        </div>

        <div class="progress-wrap" aria-label="Progress">
          <div class="progress-meta">
            <span id="progressLabel">Progress: 1 / 20</span>
            <span id="totalPointsLabel">Total Possible: 100</span>
          </div>
          <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="20" aria-valuenow="1">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div id="pointsWarning" class="points-warning" hidden>Total ≠ 100</div>
        </div>
      </section>
    </header>

    <section class="card">
      <div class="card-head">
        <h2 class="card-title">Daily Scorecard</h2>
        <p class="hint">Tap a row to toggle. Edit task names/points anytime.</p>
      </div>

      <ul id="taskList" class="task-list" aria-label="Tasks"></ul>
    </section>

    <section class="card">
      <div class="result-row">
        <div class="score">
          <div class="score-label">Today’s Score</div>
          <div class="score-value"><span id="scoreValue">0</span> / <span id="scoreTotal">100</span></div>
        </div>
        <div class="date">
          <div class="score-label">Today</div>
          <div id="todayKey" class="score-value muted">—</div>
        </div>
      </div>

      <div id="messageBox" class="message message--neutral" role="status">
        Check tasks and calculate your score.
      </div>

      <div id="milestoneBox" class="milestone" hidden>
        <div id="milestoneText" class="milestone-text"></div>
        <button id="dismissMilestoneBtn" class="btn btn-ghost" type="button">Dismiss</button>
      </div>
    </section>

    <footer class="actions" aria-label="Actions">
      <button id="calcBtn" class="btn btn-primary" type="button">Calculate Score</button>
      <button id="nextDayBtn" class="btn btn-success" type="button">Next Day</button>
      <button id="resetDailyBtn" class="btn btn-danger" type="button">Reset Daily</button>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
